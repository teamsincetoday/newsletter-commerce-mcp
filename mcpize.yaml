version: 1
name: newsletter-commerce-mcp
description: Agent-native newsletter commerce intelligence. Extract product mentions and sponsor placements from Substack, Ghost, Beehiiv, and raw HTML newsletters. Section-level analysis separates editorial mentions from paid placements. Brand detection on all products.
runtime: typescript
entry: src/index.ts

build:
  install: npm ci
  command: npm run build

startCommand:
  type: http
  command: node dist/index.js

secrets:
  - name: OPENAI_API_KEY
    required: true
    description: OpenAI API key for product extraction
  - name: MCP_API_KEYS
    required: false
    description: Comma-separated API keys for authenticated access (optional)
  - name: X402_WALLET_ADDRESS
    required: false
    description: Ethereum wallet address for x402 micropayments (optional)
